# file    : .github/workflows/rename.yml
# desc    : Auto rename images sequentially (Fix Duplicate Version)
# author  : febry  ⪩  2026
# ════════════════════════════════════════════

name: Sequential Image Renamer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Process Renaming
        run: |
          mkdir -p /tmp/meme-staging
          
          echo "📦 Memindahkan semua file JPG ke staging..."
          for file in *.jpg; do
            if [ -f "$file" ]; then
              cp "$file" /tmp/meme-staging/
            fi
          done

          echo "🗑️ Menghapus track file lama dari Git agar tidak duplikat..."
          git rm *.jpg --ignore-unmatch

          echo "🚀 Mendata dan menyusun ulang file secara berurutan..."
          cd /tmp/meme-staging
          
          # Ambil list file, urutkan natural, lalu rename pake file descriptor biar count gak reset
          count=1
          ls -1 *.jpg | sort -V > /tmp/filelist.txt
          
          while read -r filename; do
            if [ -f "$filename" ]; then
              mv "$filename" "${GITHUB_WORKSPACE}/meme-${count}.jpg"
              count=$((count + 1))
            fi
          done < /tmp/filelist.txt

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Pasang status track baru untuk file yang berhasil di-rename
          git add meme-*.jpg
          
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan nama file."
          else
            git commit -m "chore: clean and auto rename images sequentially [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi
          
